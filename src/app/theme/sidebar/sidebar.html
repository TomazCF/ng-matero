@if (showHeader()) {
  <div class="matero-sidebar-header">
    <mat-toolbar>
      <app-branding [showName]="!toggleChecked()" />

      <span class="flex-fill"></span>

      @if (showToggle()) {
        <mat-slide-toggle hideIcon [checked]="toggleChecked()" (change)="toggleCollapsed.emit()" />
      } @else {
        <button mat-icon-button (click)="closeSidenav.emit()">
          <mat-icon>close</mat-icon>
        </button>
      }
    </mat-toolbar>
  </div>
}

<div class="matero-sidebar-main">
  <nav class="matero-sidebar-nav">
    <a routerLink="/inicio" routerLinkActive="active" class="matero-sidebar-link">Inicio</a>
    <a routerLink="/agenda" routerLinkActive="active" class="matero-sidebar-link">Agenda</a>
    <a routerLink="/pacientes" routerLinkActive="active" class="matero-sidebar-link">Pacientes</a>
  </nav>
</div>
